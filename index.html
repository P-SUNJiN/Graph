<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문조사 결과 대시보드</title>
<style>
/* ============ 색상 토큰 (라이트/다크) ============ */
:root{
  color-scheme: light;
  --page:#f9f9f7;
  --surface:#fcfcfb;
  --ink:#0b0b0b;
  --ink2:#52514e;
  --muted:#898781;
  --grid:#e1e0d9;
  --axis:#c3c2b7;
  --border:rgba(11,11,11,.10);
  --accent:#2a78d6;
  --wash:rgba(11,11,11,.045);
  --danger:#d03b3b;
}
@media (prefers-color-scheme: dark){
  html:not([data-theme="light"]){
    color-scheme: dark;
    --page:#0d0d0d;
    --surface:#1a1a19;
    --ink:#ffffff;
    --ink2:#c3c2b7;
    --muted:#898781;
    --grid:#2c2c2a;
    --axis:#383835;
    --border:rgba(255,255,255,.10);
    --accent:#3987e5;
    --wash:rgba(255,255,255,.06);
    --danger:#e66767;
  }
}
html[data-theme="dark"]{
  color-scheme: dark;
  --page:#0d0d0d;
  --surface:#1a1a19;
  --ink:#ffffff;
  --ink2:#c3c2b7;
  --muted:#898781;
  --grid:#2c2c2a;
  --axis:#383835;
  --border:rgba(255,255,255,.10);
  --accent:#3987e5;
  --wash:rgba(255,255,255,.06);
  --danger:#e66767;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Segoe UI","Malgun Gothic",sans-serif;
  background:var(--page);
  color:var(--ink);
  line-height:1.5;
}

/* ============ 상단 툴바 ============ */
.toolbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:10px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.toolbar .spacer{flex:1}
.btn{
  appearance:none;border:1px solid var(--border);background:var(--surface);
  color:var(--ink);font:inherit;font-size:13px;font-weight:500;
  padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;
}
.btn:hover{background:var(--wash)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.07)}
.btn.danger-text{color:var(--danger)}
.switch{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;user-select:none}
.switch input{position:absolute;opacity:0;pointer-events:none}
.switch .track{
  width:38px;height:22px;border-radius:11px;background:var(--axis);
  position:relative;transition:background .15s;flex:none;
}
.switch .track::after{
  content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;
  background:#fff;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.25);
}
.switch input:checked + .track{background:var(--accent)}
.switch input:checked + .track::after{transform:translateX(16px)}
.edit-hint{font-size:12px;color:var(--muted)}

/* ============ 레이아웃 ============ */
main{max-width:1240px;margin:0 auto;padding:28px 20px 60px}
.page-head{padding:6px 4px 22px}
.page-head h1{font-size:27px;font-weight:700;letter-spacing:-.3px}
.page-head .subtitle{font-size:14px;color:var(--ink2);margin-top:4px}
.page-head .subtitle:empty{display:none}
.page-head input{display:block;width:100%}
.page-head input.title-input{font-size:27px;font-weight:700;letter-spacing:-.3px}
.page-head input.subtitle-input{font-size:14px;color:var(--ink2);margin-top:8px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(480px,100%),1fr));gap:20px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px 22px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04);
  display:flex;flex-direction:column;gap:14px;
}
.card-top{display:flex;flex-direction:column;gap:10px}
.card-top .row1{display:flex;align-items:flex-start;gap:10px}
.card-top h3{font-size:16px;font-weight:700;flex:1;letter-spacing:-.2px}
.badge{
  flex:none;font-size:12px;font-weight:600;color:var(--ink2);
  background:var(--wash);border-radius:999px;padding:3px 10px;margin-top:1px;
  font-variant-numeric:tabular-nums;
}
.q-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.q-controls select{flex:none}
.icon-btn{
  appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--ink2);
  width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:13px;line-height:1;
}
.icon-btn:hover{background:var(--wash)}
.icon-btn.del:hover{color:var(--danger);border-color:var(--danger)}

.chart-area{min-height:120px}
.chart-area svg{width:100%;height:auto;display:block}
.chart-area svg text{font-family:inherit}
[data-tip]{cursor:default}
svg [data-tip]:hover{opacity:.82}

/* 원/도넛 + 범례 */
.pie-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.pie-wrap svg{flex:1 1 220px;max-width:300px;margin:0 auto}
.legend{list-style:none;flex:1 1 180px;display:flex;flex-direction:column;gap:7px;font-size:13px}
.legend li{display:flex;align-items:center;gap:8px}
.legend .sw{width:12px;height:12px;border-radius:3px;flex:none}
.legend .lb{color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.legend .vl{color:var(--ink2);font-variant-numeric:tabular-nums;white-space:nowrap}

/* 표 */
.data-table{width:100%;border-collapse:collapse;font-size:13.5px}
.data-table th{
  text-align:left;font-size:12px;font-weight:600;color:var(--muted);
  padding:7px 10px;border-bottom:1px solid var(--axis);
}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--grid)}
.data-table th.num,.data-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.data-table td.num{color:var(--ink2)}
.data-table .bar-cell{width:34%;min-width:110px}
.data-table .tbar-track{background:var(--wash);border-radius:4px;height:14px;overflow:hidden}
.data-table .tbar{height:100%;border-radius:4px 0 0 4px}
.data-table tfoot td{border-bottom:none;font-weight:700;color:var(--ink)}
.data-table tfoot td.num{color:var(--ink)}

.chart-msg{
  padding:28px 10px;text-align:center;color:var(--muted);font-size:13px;
  border:1px dashed var(--grid);border-radius:10px;
}

/* ============ 편집 UI ============ */
input,select{
  font:inherit;color:var(--ink);background:var(--surface);
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13.5px;
}
input:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px}
input[type="color"]{
  padding:2px;width:34px;height:30px;cursor:pointer;border-radius:7px;flex:none;
}
input.q-title-input{width:100%;font-weight:700;font-size:15px}
input.item-count{width:86px;text-align:right;font-variant-numeric:tabular-nums}

.items-editor{
  border-top:1px dashed var(--grid);padding-top:12px;
  display:flex;flex-direction:column;gap:7px;
}
.items-editor .ed-head{font-size:12px;font-weight:600;color:var(--muted)}
.item-row{display:flex;align-items:center;gap:7px}
.item-row .item-label{flex:1;min-width:0}
.item-row .arrows{display:flex;gap:4px;flex:none}
.add-item-btn{align-self:flex-start;margin-top:2px}

.empty-state{
  grid-column:1/-1;text-align:center;padding:70px 20px;
  border:1.5px dashed var(--axis);border-radius:14px;color:var(--muted);font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}

/* 보기/편집 모드 전환 */
.edit-only{display:none !important}
body.edit .edit-only{display:revert !important}
body.edit .item-row{display:flex !important}
body.edit .q-controls{display:flex !important}
body.edit .view-only{display:none !important}

/* 툴팁 */
#tooltip{
  position:fixed;display:none;z-index:99;pointer-events:none;
  background:var(--ink);color:var(--page);font-size:12px;font-weight:500;
  padding:5px 9px;border-radius:7px;box-shadow:0 3px 10px rgba(0,0,0,.25);
  max-width:280px;
}

/* ============ 인쇄/캡처 ============ */
@media print{
  .toolbar,.edit-only,#tooltip{display:none !important}
  body{background:#fff}
  .card{break-inside:avoid;box-shadow:none}
  main{max-width:none;padding:0}
}
</style>
</head>
<body>

<div class="toolbar">
  <label class="switch">
    <input type="checkbox" id="editToggle">
    <span class="track"></span>
    <span>편집 모드</span>
  </label>
  <span class="edit-hint edit-only">변경 사항은 이 브라우저에 자동 저장됩니다</span>
  <span class="spacer"></span>
  <button class="btn primary edit-only" data-action="add-q">＋ 질문 추가</button>
  <button class="btn" data-action="export">JSON 내보내기</button>
  <button class="btn" data-action="import">JSON 불러오기</button>
  <button class="btn edit-only" data-action="sample">예시 데이터</button>
  <button class="btn danger-text edit-only" data-action="reset">전체 초기화</button>
  <button class="btn" data-action="theme" title="라이트/다크 전환">🌓</button>
  <input type="file" id="importFile" accept=".json,application/json" hidden>
</div>

<main>
  <header class="page-head" id="pageHead"></header>
  <div class="cards" id="cards"></div>
</main>

<div id="tooltip"></div>

<script>
"use strict";

/* ============ 검증된 기본 팔레트 (범주형 8색, 고정 순서) ============ */
const CAT = ["#2a78d6","#1baf7a","#eda100","#008300","#4a3aa7","#e34948","#e87ba4","#eb6834"];

const CHART_TYPES = [
  ["barV","세로 막대"],
  ["barH","가로 막대"],
  ["pie","원그래프"],
  ["donut","도넛 차트"],
  ["line","꺾은선그래프"],
  ["radar","레이더 차트"],
  ["table","표"],
];

const KEY = "survey-dashboard-data-v1";
let _uid = 1;
const uid = () => "q" + (_uid++) + "_" + Date.now().toString(36);

/* ============ 예시 데이터 ============ */
function sampleData(){
  return normalize({
    title: "STEP-UP 초고령층 스마트폰 사용 실태 조사",
    subtitle: "2026년 1학기 탐구 프로젝트 · 응답자 44명",
    questions: [
      { title: "스마트폰 사용 중 가장 어려운 점은 무엇인가요?", type: "pie",
        items: [
          { label:"글씨가 작다", count:12 },
          { label:"메뉴가 복잡하다", count:18 },
          { label:"용어가 어렵다", count:9 },
          { label:"오작동이 잦다", count:5 },
        ]},
      { title: "하루 평균 스마트폰 사용 시간은?", type: "barV",
        items: [
          { label:"1시간 미만", count:8 },
          { label:"1~3시간", count:14 },
          { label:"3~5시간", count:12 },
          { label:"5시간 이상", count:6 },
        ]},
      { title: "가장 자주 사용하는 기능은?", type: "barH",
        items: [
          { label:"전화·문자", count:22 },
          { label:"카카오톡", count:15 },
          { label:"유튜브", count:9 },
          { label:"사진 촬영", count:7 },
          { label:"인터넷 검색", count:5 },
        ]},
      { title: "스마트폰 교육이 필요하다고 생각하시나요?", type: "table",
        items: [
          { label:"매우 필요하다", count:20 },
          { label:"필요하다", count:16 },
          { label:"보통이다", count:5 },
          { label:"필요 없다", count:3 },
        ]},
    ],
  });
}

function blankData(){
  return { title:"새 설문조사", subtitle:"", questions:[] };
}

/* ============ 상태 ============ */
function normalize(d){
  const out = { title: String(d.title ?? "설문조사"), subtitle: String(d.subtitle ?? ""), questions: [] };
  if (Array.isArray(d.questions)) for (const q of d.questions){
    const nq = {
      id: q.id || uid(),
      title: String(q.title ?? "새 질문"),
      type: CHART_TYPES.some(t => t[0] === q.type) ? q.type : "barV",
      items: [],
    };
    if (Array.isArray(q.items)) q.items.forEach((it, i) => {
      nq.items.push({
        label: String(it.label ?? "항목 " + (i+1)),
        count: Math.max(0, Number(it.count) || 0),
        color: /^#[0-9a-fA-F]{6}$/.test(it.color || "") ? it.color : CAT[i % CAT.length],
      });
    });
    out.questions.push(nq);
  }
  return out;
}

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if (raw){
      const d = JSON.parse(raw);
      if (d && Array.isArray(d.questions)) return normalize(d);
    }
  }catch(e){}
  return sampleData();
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

/* ============ 유틸 ============ */
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const fmt = n => Number(n).toLocaleString("ko-KR", { maximumFractionDigits: 2 });
const pctOf = (c, t) => t > 0 ? (c / t * 100) : 0;
const pctStr = (c, t) => {
  const p = pctOf(c, t);
  return (Math.round(p * 10) / 10).toLocaleString("ko-KR", { maximumFractionDigits: 1 }) + "%";
};
const r2 = n => Math.round(n * 100) / 100;
const total = q => q.items.reduce((s, it) => s + (Number(it.count) || 0), 0);

const _mctx = document.createElement("canvas").getContext("2d");
function tw(text, size = 12, weight = 400){
  _mctx.font = `${weight} ${size}px "Pretendard Variable",Pretendard,system-ui,"Malgun Gothic",sans-serif`;
  return _mctx.measureText(text).width;
}
function truncate(label, maxW, size = 12){
  if (tw(label, size) <= maxW) return label;
  let s = label;
  while (s.length > 1 && tw(s + "…", size) > maxW) s = s.slice(0, -1);
  return s + "…";
}
function wrapLabel(label, maxW, size = 12){
  const lines = []; let cur = "";
  for (let i = 0; i < label.length; i++){
    const ch = label[i];
    if (cur && tw(cur + ch, size) > maxW){
      lines.push(cur); cur = ch;
      if (lines.length === 2){
        const rest = lines.pop() + label.slice(i);
        lines.push(truncate(rest, maxW, size));
        return lines;
      }
    } else cur += ch;
  }
  if (cur) lines.push(cur);
  return lines.length ? lines : [""];
}
function niceScale(maxVal){
  if (!(maxVal > 0)) return { max: 4, ticks: [0,1,2,3,4] };
  const rough = maxVal / 4;
  const pow = Math.pow(10, Math.floor(Math.log10(rough)));
  let step = [1,2,2.5,5,10].map(c => c * pow).find(s => Math.ceil(maxVal / s) <= 5) || 10 * pow;
  const top = Math.ceil(maxVal / step) * step;
  const ticks = [];
  for (let v = 0; v <= top + 1e-9; v += step) ticks.push(r2(v));
  return { max: top, ticks };
}
const tipAttr = (it, t) => `data-tip="${esc(it.label)} · ${fmt(it.count)} (${pctStr(it.count, t)})"`;

/* ============ 차트 렌더러 (순수 SVG) ============ */

function chartHTML(q){
  if (!q.items.length)
    return `<div class="chart-msg">아직 항목이 없습니다. 편집 모드에서 <b>＋ 항목 추가</b>를 눌러 데이터를 입력하세요.</div>`;
  switch(q.type){
    case "barH":  return barH(q);
    case "pie":   return pieDonut(q, false);
    case "donut": return pieDonut(q, true);
    case "line":  return lineChart(q);
    case "radar": return radarChart(q);
    case "table": return tableChart(q);
    default:      return barV(q);
  }
}

/* --- 세로 막대 --- */
function barV(q){
  const t = total(q), n = q.items.length;
  const W = 640, H = 340, m = { t: 30, r: 14, b: 54, l: 46 };
  const pw = W - m.l - m.r, ph = H - m.t - m.b;
  const sc = niceScale(Math.max(...q.items.map(i => i.count)));
  const band = pw / n, bw = Math.min(24, band * 0.55);
  const y = v => m.t + ph - (v / sc.max) * ph;

  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(q.title)} 세로 막대그래프">`;
  for (const tv of sc.ticks){
    const ty = r2(y(tv));
    s += `<line x1="${m.l}" y1="${ty}" x2="${W-m.r}" y2="${ty}" stroke="${tv===0?'var(--axis)':'var(--grid)'}" stroke-width="1"/>`;
    s += `<text x="${m.l-8}" y="${ty+4}" text-anchor="end" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${fmt(tv)}</text>`;
  }
  q.items.forEach((it, i) => {
    const cx = m.t, x0 = r2(m.l + band * i + (band - bw) / 2);
    const yTop = y(it.count), h = m.t + ph - yTop;
    const bx1 = r2(x0 + bw), byTop = r2(yTop), by0 = m.t + ph;
    if (h >= 4){
      s += `<path ${tipAttr(it, t)} fill="${it.color}" d="M${x0},${by0} L${x0},${r2(byTop+4)} Q${x0},${byTop} ${r2(x0+4)},${byTop} L${r2(bx1-4)},${byTop} Q${bx1},${byTop} ${bx1},${r2(byTop+4)} L${bx1},${by0} Z"/>`;
    } else if (h > 0){
      s += `<rect ${tipAttr(it, t)} fill="${it.color}" x="${x0}" y="${byTop}" width="${bw}" height="${r2(h)}"/>`;
    }
    s += `<text x="${r2(x0+bw/2)}" y="${r2((h>0?byTop:by0)-7)}" text-anchor="middle" font-size="12" font-weight="600" fill="var(--ink2)" style="font-variant-numeric:tabular-nums">${fmt(it.count)}</text>`;
    wrapLabel(it.label, band - 8).forEach((ln, li) => {
      s += `<text x="${r2(m.l + band*i + band/2)}" y="${by0 + 16 + li*14}" text-anchor="middle" font-size="12" fill="var(--muted)">${esc(ln)}</text>`;
    });
  });
  return s + `</svg>`;
}

/* --- 가로 막대 --- */
function barH(q){
  const t = total(q), n = q.items.length;
  const rowH = 40, bh = 20;
  const labelW = Math.min(170, Math.max(...q.items.map(i => tw(i.label, 12.5))) + 18);
  const W = 640, m = { t: 10, r: 62, b: 30, l: r2(labelW) };
  const H = m.t + n * rowH + m.b;
  const pw = W - m.l - m.r;
  const sc = niceScale(Math.max(...q.items.map(i => i.count)));
  const x = v => m.l + (v / sc.max) * pw;

  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(q.title)} 가로 막대그래프">`;
  for (const tv of sc.ticks){
    const tx = r2(x(tv));
    s += `<line x1="${tx}" y1="${m.t}" x2="${tx}" y2="${H-m.b}" stroke="${tv===0?'var(--axis)':'var(--grid)'}" stroke-width="1"/>`;
    s += `<text x="${tx}" y="${H-m.b+16}" text-anchor="middle" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${fmt(tv)}</text>`;
  }
  q.items.forEach((it, i) => {
    const cy = m.t + rowH * i + rowH / 2;
    const y0 = r2(cy - bh / 2), y1 = r2(cy + bh / 2);
    const xe = x(it.count), w = xe - m.l;
    if (w >= 4){
      s += `<path ${tipAttr(it, t)} fill="${it.color}" d="M${m.l},${y0} L${r2(xe-4)},${y0} Q${r2(xe)},${y0} ${r2(xe)},${r2(y0+4)} L${r2(xe)},${r2(y1-4)} Q${r2(xe)},${y1} ${r2(xe-4)},${y1} L${m.l},${y1} Z"/>`;
    } else if (w > 0){
      s += `<rect ${tipAttr(it, t)} fill="${it.color}" x="${m.l}" y="${y0}" width="${r2(w)}" height="${bh}"/>`;
    }
    s += `<text x="${m.l-9}" y="${r2(cy+4)}" text-anchor="end" font-size="12.5" fill="var(--ink)">${esc(truncate(it.label, labelW - 14, 12.5))}</text>`;
    s += `<text x="${r2(Math.max(xe, m.l)+8)}" y="${r2(cy+4)}" font-size="12" font-weight="600" fill="var(--ink2)" style="font-variant-numeric:tabular-nums">${fmt(it.count)}</text>`;
  });
  return s + `</svg>`;
}

/* --- 원그래프 / 도넛 --- */
function pieDonut(q, donut){
  const t = total(q);
  const S = 300, cx = S/2, cy = S/2, r = 128, ri = donut ? 76 : 0;
  const polar = (rad, a) => [r2(cx + rad * Math.cos(a)), r2(cy + rad * Math.sin(a))];

  let svg = `<svg viewBox="0 0 ${S} ${S}" role="img" aria-label="${esc(q.title)} ${donut?'도넛 차트':'원그래프'}">`;
  const visible = q.items.filter(it => it.count > 0);
  if (t <= 0){
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--grid)" stroke-width="2"/>`;
    svg += `<text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="13" fill="var(--muted)">응답 없음</text>`;
  } else if (visible.length === 1){
    const it = visible[0];
    if (donut)
      svg += `<circle ${tipAttr(it, t)} cx="${cx}" cy="${cy}" r="${(r+ri)/2}" fill="none" stroke="${it.color}" stroke-width="${r-ri}"/>`;
    else
      svg += `<circle ${tipAttr(it, t)} cx="${cx}" cy="${cy}" r="${r}" fill="${it.color}"/>`;
  } else {
    let a0 = -Math.PI / 2;
    for (const it of visible){
      const a1 = a0 + (it.count / t) * Math.PI * 2;
      const laf = (a1 - a0) > Math.PI ? 1 : 0;
      const [x0o,y0o] = polar(r, a0), [x1o,y1o] = polar(r, a1);
      let d;
      if (donut){
        const [x0i,y0i] = polar(ri, a0), [x1i,y1i] = polar(ri, a1);
        d = `M${x0o},${y0o} A${r},${r} 0 ${laf} 1 ${x1o},${y1o} L${x1i},${y1i} A${ri},${ri} 0 ${laf} 0 ${x0i},${y0i} Z`;
      } else {
        d = `M${cx},${cy} L${x0o},${y0o} A${r},${r} 0 ${laf} 1 ${x1o},${y1o} Z`;
      }
      svg += `<path ${tipAttr(it, t)} d="${d}" fill="${it.color}" stroke="var(--surface)" stroke-width="2" stroke-linejoin="round"/>`;
      a0 = a1;
    }
  }
  if (donut && t > 0){
    svg += `<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="30" font-weight="600" fill="var(--ink)">${fmt(t)}</text>`;
    svg += `<text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="12" fill="var(--muted)">전체 응답</text>`;
  }
  svg += `</svg>`;

  const legend = q.items.map(it => `
    <li ${tipAttr(it, t)}>
      <span class="sw" style="background:${it.color}"></span>
      <span class="lb">${esc(it.label)}</span>
      <span class="vl">${fmt(it.count)} · ${pctStr(it.count, t)}</span>
    </li>`).join("");

  return `<div class="pie-wrap">${svg}<ul class="legend">${legend}</ul></div>`;
}

/* --- 꺾은선 --- */
function lineChart(q){
  const t = total(q), n = q.items.length;
  const W = 640, H = 340, m = { t: 30, r: 20, b: 54, l: 46 };
  const pw = W - m.l - m.r, ph = H - m.t - m.b;
  const sc = niceScale(Math.max(...q.items.map(i => i.count)));
  const band = pw / n;
  const px = i => r2(m.l + band * (i + 0.5));
  const py = v => r2(m.t + ph - (v / sc.max) * ph);
  const color = CAT[0];

  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(q.title)} 꺾은선그래프">`;
  for (const tv of sc.ticks){
    const ty = py(tv);
    s += `<line x1="${m.l}" y1="${ty}" x2="${W-m.r}" y2="${ty}" stroke="${tv===0?'var(--axis)':'var(--grid)'}" stroke-width="1"/>`;
    s += `<text x="${m.l-8}" y="${ty+4}" text-anchor="end" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${fmt(tv)}</text>`;
  }
  if (n > 1){
    const d = q.items.map((it, i) => `${i ? "L" : "M"}${px(i)},${py(it.count)}`).join(" ");
    s += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  }
  const maxIdx = q.items.reduce((mi, it, i) => it.count > q.items[mi].count ? i : mi, 0);
  q.items.forEach((it, i) => {
    s += `<circle ${tipAttr(it, t)} cx="${px(i)}" cy="${py(it.count)}" r="4.5" fill="${color}" stroke="var(--surface)" stroke-width="2"/>`;
    if (i === n - 1 || i === maxIdx){
      s += `<text x="${px(i)}" y="${r2(py(it.count)-11)}" text-anchor="middle" font-size="12" font-weight="600" fill="var(--ink2)" style="font-variant-numeric:tabular-nums">${fmt(it.count)}</text>`;
    }
    wrapLabel(it.label, band - 8).forEach((ln, li) => {
      s += `<text x="${px(i)}" y="${m.t + ph + 16 + li*14}" text-anchor="middle" font-size="12" fill="var(--muted)">${esc(ln)}</text>`;
    });
  });
  return s + `</svg>`;
}

/* --- 레이더 --- */
function radarChart(q){
  const n = q.items.length;
  if (n < 3)
    return `<div class="chart-msg">레이더 차트는 항목이 <b>3개 이상</b>일 때 표시됩니다. 항목을 추가하거나 다른 그래프를 선택하세요.</div>`;
  const t = total(q);
  const W = 480, H = 380, cx = W/2, cy = H/2, R = 118;
  const sc = niceScale(Math.max(...q.items.map(i => i.count)));
  const ang = i => -Math.PI / 2 + (Math.PI * 2 * i) / n;
  const pt = (i, v) => [r2(cx + (v / sc.max) * R * Math.cos(ang(i))), r2(cy + (v / sc.max) * R * Math.sin(ang(i)))];
  const color = CAT[0];

  let s = `<svg viewBox="0 0 ${W} ${H}" style="max-width:500px;margin:0 auto" role="img" aria-label="${esc(q.title)} 레이더 차트">`;
  const lastTick = sc.ticks[sc.ticks.length - 1];
  for (const tv of sc.ticks){
    if (tv === 0) continue;
    const ring = q.items.map((_, i) => pt(i, tv).join(",")).join(" ");
    s += `<polygon points="${ring}" fill="none" stroke="var(--grid)" stroke-width="1"/>`;
    if (tv !== lastTick)
      s += `<text x="${cx+6}" y="${r2(cy - (tv/sc.max)*R - 3)}" font-size="10" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${fmt(tv)}</text>`;
  }
  q.items.forEach((_, i) => {
    const [x, y] = pt(i, sc.max);
    s += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
  });
  const poly = q.items.map((it, i) => pt(i, it.count).join(",")).join(" ");
  s += `<polygon points="${poly}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
  q.items.forEach((it, i) => {
    const [x, y] = pt(i, it.count);
    s += `<circle ${tipAttr(it, t)} cx="${x}" cy="${y}" r="4.5" fill="${color}" stroke="var(--surface)" stroke-width="2"/>`;
    const a = ang(i);
    const lx = r2(cx + (R + 16) * Math.cos(a)), ly = r2(cy + (R + 16) * Math.sin(a));
    const anchor = Math.abs(Math.cos(a)) < 0.35 ? "middle" : (Math.cos(a) > 0 ? "start" : "end");
    const dy = Math.abs(Math.sin(a)) < 0.35 ? 4 : (Math.sin(a) > 0 ? 12 : -4);
    s += `<text x="${lx}" y="${r2(ly+dy)}" text-anchor="${anchor}" font-size="12" fill="var(--ink2)">${esc(truncate(it.label, 96))}</text>`;
    s += `<text x="${lx}" y="${r2(ly+dy+14)}" text-anchor="${anchor}" font-size="11" fill="var(--muted)" style="font-variant-numeric:tabular-nums">${fmt(it.count)}</text>`;
  });
  return s + `</svg>`;
}

/* --- 표 --- */
function tableChart(q){
  const t = total(q);
  const maxC = Math.max(...q.items.map(i => i.count), 1);
  const rows = q.items.map(it => `
    <tr ${tipAttr(it, t)}>
      <td>${esc(it.label)}</td>
      <td class="num">${fmt(it.count)}</td>
      <td class="num">${pctStr(it.count, t)}</td>
      <td class="bar-cell"><div class="tbar-track"><div class="tbar" style="width:${r2(pctOf(it.count, maxC))}%;background:${it.color}"></div></div></td>
    </tr>`).join("");
  return `<table class="data-table">
    <thead><tr><th>항목</th><th class="num">응답 수</th><th class="num">비율(%)</th><th class="bar-cell">분포</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>합계</td><td class="num">${fmt(t)}</td><td class="num">${t>0?"100%":"-"}</td><td></td></tr></tfoot>
  </table>`;
}

/* ============ 화면 렌더 ============ */

function render(){
  renderHead();
  renderCards();
}

function renderHead(){
  document.title = state.title || "설문조사 결과 대시보드";
  document.getElementById("pageHead").innerHTML = `
    <h1 class="view-only">${esc(state.title)}</h1>
    <p class="subtitle view-only">${esc(state.subtitle)}</p>
    <input class="title-input edit-only" data-field="title" value="${esc(state.title)}" placeholder="설문 제목을 입력하세요">
    <input class="subtitle-input edit-only" data-field="subtitle" value="${esc(state.subtitle)}" placeholder="부제 (선택) — 예: 조사 기간, 응답자 수">`;
}

function typeSelect(q){
  return `<select class="q-type" aria-label="그래프 종류">` +
    CHART_TYPES.map(([v, l]) => `<option value="${v}"${q.type===v?" selected":""}>${l}</option>`).join("") +
    `</select>`;
}

function cardHTML(q, idx){
  const t = total(q);
  const items = q.items.map((it, i) => `
    <div class="item-row" data-idx="${i}">
      <input type="color" class="item-color" value="${it.color}" aria-label="항목 색상">
      <input class="item-label" value="${esc(it.label)}" placeholder="항목 이름">
      <input class="item-count" type="number" min="0" step="any" value="${it.count}" aria-label="응답 수">
      <span class="arrows">
        <button class="icon-btn" data-action="up-item" title="위로">↑</button>
        <button class="icon-btn" data-action="down-item" title="아래로">↓</button>
        <button class="icon-btn del" data-action="del-item" title="항목 삭제">✕</button>
      </span>
    </div>`).join("");

  return `
  <section class="card" data-id="${q.id}">
    <div class="card-top">
      <div class="row1">
        <h3 class="view-only">Q${idx+1}. ${esc(q.title)}</h3>
        <input class="q-title-input edit-only" value="${esc(q.title)}" placeholder="질문을 입력하세요">
        <span class="badge">응답 ${fmt(t)}</span>
      </div>
      <div class="q-controls edit-only">
        ${typeSelect(q)}
        <button class="icon-btn" data-action="up-q" title="질문 위로">↑</button>
        <button class="icon-btn" data-action="down-q" title="질문 아래로">↓</button>
        <button class="icon-btn del" data-action="del-q" title="질문 삭제">✕</button>
      </div>
    </div>
    <div class="chart-area">${chartHTML(q)}</div>
    <div class="items-editor edit-only">
      <div class="ed-head">항목 · 응답 수 (입력 즉시 그래프에 반영)</div>
      ${items}
      <button class="btn add-item-btn" data-action="add-item">＋ 항목 추가</button>
    </div>
  </section>`;
}

function renderCards(){
  const el = document.getElementById("cards");
  if (!state.questions.length){
    el.innerHTML = `
      <div class="empty-state">
        <div>아직 질문이 없습니다.<br>편집 모드를 켜고 <b>질문 추가</b>를 눌러 설문 결과를 입력하세요.</div>
        <button class="btn primary" data-action="add-q">＋ 질문 추가</button>
      </div>`;
    return;
  }
  el.innerHTML = state.questions.map(cardHTML).join("");
}

/* 카드 부분 갱신 (입력 포커스 유지를 위해 차트 영역만 다시 그림) */
function refreshChart(qid){
  const q = state.questions.find(x => x.id === qid);
  const card = document.querySelector(`.card[data-id="${qid}"]`);
  if (!q || !card) return;
  card.querySelector(".chart-area").innerHTML = chartHTML(q);
  card.querySelector(".badge").textContent = "응답 " + fmt(total(q));
}

/* ============ 이벤트 ============ */

const findQ = el => {
  const card = el.closest(".card");
  return card ? state.questions.find(q => q.id === card.dataset.id) : null;
};

document.addEventListener("input", e => {
  const el = e.target;
  if (el.dataset.field === "title" || el.dataset.field === "subtitle"){
    state[el.dataset.field] = el.value;
    const head = document.getElementById("pageHead");
    head.querySelector(el.dataset.field === "title" ? "h1" : ".subtitle").textContent = el.value;
    if (el.dataset.field === "title") document.title = el.value || "설문조사 결과 대시보드";
    save(); return;
  }
  const q = findQ(el);
  if (!q) return;
  if (el.classList.contains("q-title-input")){
    q.title = el.value;
    const idx = state.questions.indexOf(q);
    el.closest(".card").querySelector("h3").textContent = `Q${idx+1}. ${el.value}`;
    save(); return;
  }
  const row = el.closest(".item-row");
  if (row){
    const it = q.items[+row.dataset.idx];
    if (!it) return;
    if (el.classList.contains("item-label")) it.label = el.value;
    else if (el.classList.contains("item-count")) it.count = Math.max(0, parseFloat(el.value) || 0);
    else if (el.classList.contains("item-color")) it.color = el.value;
    refreshChart(q.id); save();
  }
});

document.addEventListener("change", e => {
  if (e.target.classList.contains("q-type")){
    const q = findQ(e.target);
    if (q){ q.type = e.target.value; refreshChart(q.id); save(); }
  }
});

document.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const act = btn.dataset.action;
  const q = findQ(btn);
  const qi = q ? state.questions.indexOf(q) : -1;
  const row = btn.closest(".item-row");
  const ii = row ? +row.dataset.idx : -1;

  switch(act){
    case "add-q":{
      const nq = { id: uid(), title: "새 질문", type: "barV",
        items: [
          { label: "항목 1", count: 0, color: CAT[0] },
          { label: "항목 2", count: 0, color: CAT[1] },
        ]};
      state.questions.push(nq);
      render(); save();
      const card = document.querySelector(`.card[data-id="${nq.id}"]`);
      if (card){ card.scrollIntoView({ behavior: "smooth", block: "center" }); card.querySelector(".q-title-input")?.select(); }
      break;
    }
    case "del-q":
      if (q && confirm(`"${q.title}" 질문을 삭제할까요?`)){
        state.questions.splice(qi, 1); render(); save();
      }
      break;
    case "up-q":
      if (q && qi > 0){ [state.questions[qi-1], state.questions[qi]] = [state.questions[qi], state.questions[qi-1]]; render(); save(); }
      break;
    case "down-q":
      if (q && qi < state.questions.length - 1){ [state.questions[qi+1], state.questions[qi]] = [state.questions[qi], state.questions[qi+1]]; render(); save(); }
      break;
    case "add-item":
      if (q){
        q.items.push({ label: "항목 " + (q.items.length + 1), count: 0, color: CAT[q.items.length % CAT.length] });
        render(); save();
        document.querySelector(`.card[data-id="${q.id}"] .item-row:last-of-type .item-label`)?.select();
      }
      break;
    case "del-item":
      if (q && ii >= 0){ q.items.splice(ii, 1); render(); save(); }
      break;
    case "up-item":
      if (q && ii > 0){ [q.items[ii-1], q.items[ii]] = [q.items[ii], q.items[ii-1]]; render(); save(); }
      break;
    case "down-item":
      if (q && ii >= 0 && ii < q.items.length - 1){ [q.items[ii+1], q.items[ii]] = [q.items[ii], q.items[ii+1]]; render(); save(); }
      break;
    case "export":{
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = (state.title || "survey").replace(/[\\/:*?"<>|]/g, "_") + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      break;
    }
    case "import":
      document.getElementById("importFile").click();
      break;
    case "sample":
      if (confirm("현재 내용을 지우고 예시 데이터를 불러올까요?")){
        state = sampleData(); render(); save();
      }
      break;
    case "reset":
      if (confirm("모든 질문과 데이터를 지우고 빈 설문으로 초기화할까요?\n(내보내기를 하지 않았다면 복구할 수 없습니다)")){
        state = blankData(); render(); save();
      }
      break;
    case "theme":{
      const html = document.documentElement;
      const dark = html.dataset.theme === "dark" ||
        (!html.dataset.theme && matchMedia("(prefers-color-scheme: dark)").matches);
      html.dataset.theme = dark ? "light" : "dark";
      try{ localStorage.setItem(KEY + ":theme", html.dataset.theme); }catch(e){}
      break;
    }
  }
});

document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const d = JSON.parse(reader.result);
      if (!d || !Array.isArray(d.questions)) throw new Error("bad format");
      state = normalize(d);
      render(); save();
    }catch(err){
      alert("JSON 파일을 읽을 수 없습니다. 이 대시보드에서 내보낸 파일인지 확인해 주세요.");
    }
  };
  reader.readAsText(file);
});

/* 편집 모드 토글 */
const editToggle = document.getElementById("editToggle");
editToggle.addEventListener("change", () => {
  document.body.classList.toggle("edit", editToggle.checked);
});

/* 툴팁 */
const tip = document.getElementById("tooltip");
document.addEventListener("mousemove", e => {
  const t = e.target.closest?.("[data-tip]");
  if (t){
    tip.textContent = t.dataset.tip;
    tip.style.display = "block";
    tip.style.left = Math.min(e.clientX + 12, innerWidth - tip.offsetWidth - 8) + "px";
    tip.style.top = Math.min(e.clientY + 16, innerHeight - tip.offsetHeight - 8) + "px";
  } else {
    tip.style.display = "none";
  }
});

/* 테마 복원 */
try{
  const th = localStorage.getItem(KEY + ":theme");
  if (th === "dark" || th === "light") document.documentElement.dataset.theme = th;
}catch(e){}

render();
</script>
</body>
</html>
