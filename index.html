<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>노인 스마트폰 설문조사 대시보드</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:'Pretendard',sans-serif;

}

body{

background:#eef2f7;

color:#222;

transition:.3s;

}

body.dark{

background:#111827;

color:white;

}

header{

height:80px;

background:#2563eb;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 30px;

box-shadow:0 3px 10px rgba(0,0,0,.15);

}

header h1{

font-size:30px;

outline:none;

}

header p{

opacity:.85;

outline:none;

}

.topButtons{

display:flex;

gap:10px;

}

button{

border:none;

cursor:pointer;

padding:10px 16px;

border-radius:10px;

background:#2563eb;

color:white;

font-size:15px;

transition:.25s;

}

button:hover{

transform:translateY(-2px);

}

.container{

display:grid;

grid-template-columns:340px 1fr;

height:calc(100vh - 80px);

}

.sidebar{

background:white;

overflow:auto;

padding:20px;

border-right:1px solid #ddd;

}

.dark .sidebar{

background:#1f2937;

}

.main{

padding:20px;

overflow:auto;

}

.card{

background:white;

border-radius:16px;

padding:18px;

margin-bottom:18px;

box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.dark .card{

background:#1f2937;

}

.card h2{

margin-bottom:15px;

}

input,select,textarea{

width:100%;

padding:10px;

border-radius:8px;

border:1px solid #ccc;

margin-bottom:12px;

font-size:15px;

}

.dark input,

.dark textarea,

.dark select{

background:#374151;

border:none;

color:white;

}

.menuBtn{

width:100%;

margin-bottom:8px;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:15px;

margin-bottom:20px;

}

.stat{

background:white;

padding:20px;

border-radius:16px;

text-align:center;

box-shadow:0 6px 20px rgba(0,0,0,.08);

}

.dark .stat{

background:#1f2937;

}

.stat h3{

font-size:14px;

margin-bottom:10px;

}

.stat p{

font-size:30px;

font-weight:bold;

}

#chart{

width:100%;

height:620px;

}

table{

width:100%;

border-collapse:collapse;

}

th,td{

padding:12px;

border:1px solid #ddd;

text-align:center;

}

.dark th,

.dark td{

border:1px solid #444;

}

</style>

</head>

<body>

<header>

<div>

<h1 contenteditable="true">

노인 스마트폰 사용 실태 조사

</h1>

<p contenteditable="true">

STEP-UP 프로젝트

</p>

</div>

<div class="topButtons">

<button id="darkBtn">

🌙 다크모드

</button>

<button id="presentBtn">

📺 발표모드

</button>

<button id="savePNG">

🖼 PNG

</button>

<button id="savePDF">

📄 PDF

</button>

</div>

</header>

<div class="container">

<div class="sidebar">

<div class="card">

<h2>

메뉴

</h2>

<div id="menuArea">

</div>

</div>

<div class="card">

<h2>

그래프 종류

</h2>

<select id="graphType">

<option value="bar">막대그래프</option>

<option value="line">선그래프</option>

<option value="pie">원그래프</option>

<option value="radar">레이더</option>

<option value="treemap">트리맵</option>

<option value="funnel">퍼널</option>

<option value="gauge">게이지</option>

<option value="sunburst">썬버스트</option>

<option value="scatter">산점도</option>

<option value="polar">극좌표</option>

</select>

</div>

<div class="card">

<h2>

편집

</h2>

<label>

문항 제목

</label>

<input id="titleInput">

<label>

항목

</label>

<textarea id="labelInput"></textarea>

<label>

응답수

</label>

<textarea id="valueInput"></textarea>

<button id="saveBtn">

저장

</button>

</div>

<div class="card">

<h2>

파일

</h2>

<button class="menuBtn">

JSON 저장

</button>

<button class="menuBtn">

JSON 불러오기

</button>

<button class="menuBtn">

CSV 가져오기

</button>

<button class="menuBtn">

Excel 가져오기

</button>

</div>

</div>

<div class="main">

<div class="stats">

<div class="stat">

<h3>

총 응답자

</h3>

<p id="total">

0

</p>

</div>

<div class="stat">

<h3>

현재 문항

</h3>

<p id="current">

A1

</p>

</div>

<div class="stat">

<h3>

최고 응답

</h3>

<p id="max">

0

</p>

</div>

<div class="stat">

<h3>

평균

</h3>

<p id="avg">

0

</p>

</div>

</div>

<div class="card">

<div id="chart"></div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>

항목

</th>

<th>

응답수

</th>

<th>

비율

</th>

</tr>

</thead>

<tbody id="tableBody">

  </tbody>

  </tbody>

</table>

</div>

</div>

</div>

<script>

const survey={

A1:{
title:"연령",
labels:["60대","70대","80대 이상"],
values:[15,24,11]
},

A2:{
title:"사용 스마트폰",
labels:["삼성","애플","LG","기타"],
values:[31,13,2,4]
},

A3:{
title:"사용 기간",
labels:["1년 미만","1~3년","3~5년","5년 이상"],
values:[4,12,16,18]
},

B1:{
title:"스마트폰 사용 빈도",
labels:["매일","주 3~5회","가끔","거의 안 함"],
values:[33,8,6,3]
},

B2:{
title:"주 사용 목적",
labels:["전화","문자","유튜브","카카오톡","검색","기타"],
values:[40,32,25,37,21,6]
},

Q1:{
title:"글씨가 너무 작다",
labels:["불편함 있음","불편함 없음"],
values:[32,18]
},

Q2:{
title:"터치가 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[28,22]
},

Q3:{
title:"설정 변경이 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[35,15]
},

Q4:{
title:"앱 찾기가 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[30,20]
},

Q5:{
title:"사기문자가 걱정된다",
labels:["불편함 있음","불편함 없음"],
values:[38,12]
},

Q6:{
title:"오류 해결이 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[29,21]
},

Q7:{
title:"검색이 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[27,23]
},

Q8:{
title:"결제가 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[22,28]
},

Q9:{
title:"업데이트가 어렵다",
labels:["불편함 있음","불편함 없음"],
values:[31,19]
},

Q10:{
title:"가장 필요한 도움",

labels:[
"글씨 확대",
"음성 안내",
"사기 예방",
"사용법 교육",
"터치 도움",
"기타"
],

values:[18,13,26,29,10,4]

},

D:{
title:"추가 의견",

labels:[
"좋음",
"보통",
"개선 필요"
],

values:[12,20,18]

}

};

let currentKey="A1";

const chart=echarts.init(document.getElementById("chart"));

const menu=document.getElementById("menuArea");

Object.keys(survey).forEach(key=>{

const btn=document.createElement("button");

btn.className="menuBtn";

btn.innerText=key;

btn.onclick=()=>{

currentKey=key;

loadEditor();

drawChart();

};

menu.appendChild(btn);

});

function loadEditor(){

const d=survey[currentKey];

current.innerText=currentKey;

titleInput.value=d.title;

labelInput.value=d.labels.join(",");

valueInput.value=d.values.join(",");

}

function updateTable(){

const d=survey[currentKey];

const body=document.getElementById("tableBody");

body.innerHTML="";

const sum=d.values.reduce((a,b)=>a+b,0);

total.innerText=sum;

max.innerText=Math.max(...d.values);

avg.innerText=(sum/d.values.length).toFixed(1);

d.labels.forEach((label,i)=>{

const tr=document.createElement("tr");

const per=((d.values[i]/sum)*100).toFixed(1);

tr.innerHTML=

"<td>"+label+"</td>"+

"<td>"+d.values[i]+"</td>"+

"<td>"+per+"%</td>";

body.appendChild(tr);

});

}

  function drawChart(){

const d=survey[currentKey];

const type=document.getElementById("graphType").value;

let option={};

if(type==="bar"){

option={

title:{
text:d.title,
left:"center"
},

tooltip:{},

xAxis:{
type:"category",
data:d.labels
},

yAxis:{
type:"value"
},

series:[{

type:"bar",

data:d.values,

label:{
show:true,
position:"top"
},

itemStyle:{
borderRadius:[8,8,0,0]
}

}]

};

}

else if(type==="line"){

option={

title:{
text:d.title,
left:"center"
},

tooltip:{},

xAxis:{
type:"category",
data:d.labels
},

yAxis:{
type:"value"
},

series:[{

type:"line",

smooth:true,

data:d.values,

label:{
show:true
},

areaStyle:{}

}]

};

}

else if(type==="pie"){

option={

title:{
text:d.title,
left:"center"
},

tooltip:{
trigger:"item"
},

series:[{

type:"pie",

radius:"70%",

data:d.labels.map((v,i)=>({

name:v,

value:d.values[i]

})),

label:{
formatter:"{b}\n{d}%"
}

}]

};

}

else if(type==="radar"){

option={

title:{
text:d.title,
left:"center"
},

tooltip:{},

radar:{

indicator:d.labels.map((v,i)=>({

name:v,

max:Math.max(...d.values)+10

}))

},

series:[{

type:"radar",

data:[{

value:d.values,

name:d.title

}]

}]

};

}

else if(type==="treemap"){

option={

title:{
text:d.title,
left:"center"
},

series:[{

type:"treemap",

data:d.labels.map((v,i)=>({

name:v,

value:d.values[i]

}))

}]

};

}

else if(type==="funnel"){

option={

title:{
text:d.title,
left:"center"
},

tooltip:{},

series:[{

type:"funnel",

sort:"descending",

data:d.labels.map((v,i)=>({

name:v,

value:d.values[i]

}))

}]

};

}

else if(type==="gauge"){

const avgValue=

d.values.reduce((a,b)=>a+b,0)

/d.values.length;

option={

series:[{

type:"gauge",

progress:{

show:true

},

detail:{

formatter:"{value}"

},

data:[{

value:avgValue.toFixed(1),

name:d.title

}]

}]

};

}

else if(type==="sunburst"){

option={

series:[{

type:"sunburst",

radius:[0,"90%"],

data:d.labels.map((v,i)=>({

name:v,

value:d.values[i]

}))

}]

};

}

else if(type==="scatter"){

option={

tooltip:{},

xAxis:{},

yAxis:{},

series:[{

type:"scatter",

symbolSize:20,

data:d.values.map((v,i)=>[i+1,v])

}]

};

}

else if(type==="polar"){

option={

angleAxis:{},

radiusAxis:{

type:"category",

data:d.labels

},

polar:{},

series:[{

type:"bar",

coordinateSystem:"polar",

data:d.values

}]

};

}

chart.setOption(option,true);

updateTable();

  }

  document.getElementById("graphType").addEventListener("change",drawChart);

document.getElementById("saveBtn").onclick=function(){

survey[currentKey].title=titleInput.value;

survey[currentKey].labels=

labelInput.value

.split(",")

.map(v=>v.trim());

survey[currentKey].values=

valueInput.value

.split(",")

.map(v=>Number(v.trim()));

drawChart();

};

document.getElementById("darkBtn").onclick=function(){

document.body.classList.toggle("dark");

chart.resize();

};

document.getElementById("presentBtn").onclick=function(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

};

document.getElementById("savePNG").onclick=function(){

const a=document.createElement("a");

a.href=chart.getDataURL({

pixelRatio:2,

backgroundColor:"#ffffff"

});

a.download=currentKey+".png";

a.click();

};

document.getElementById("savePDF").onclick=function(){

window.print();

};

function downloadJSON(){

const blob=new Blob(

[JSON.stringify(survey,null,2)],

{

type:"application/json"

}

);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="surveyData.json";

a.click();

URL.revokeObjectURL(a.href);

}

function uploadJSON(file){

const reader=new FileReader();

reader.onload=function(e){

const obj=JSON.parse(e.target.result);

Object.assign(survey,obj);

loadEditor();

drawChart();

};

reader.readAsText(file);

}

function downloadCSV(){

let csv="문항,항목,응답수\n";

Object.keys(survey).forEach(key=>{

survey[key].labels.forEach((v,i)=>{

csv+=

key+","

+v+","

+survey[key].values[i]

+"\n";

});

});

const blob=new Blob(

[csv],

{

type:"text/csv"

}

);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="survey.csv";

a.click();

URL.revokeObjectURL(a.href);

}

const fileInput=document.createElement("input");

fileInput.type="file";

fileInput.accept=".json,.csv,.xlsx";

fileInput.style.display="none";

document.body.appendChild(fileInput);

const fileButtons=document.querySelectorAll(".menuBtn");

fileButtons[0].onclick=downloadJSON;

fileButtons[1].onclick=function(){

fileInput.accept=".json";

fileInput.click();

};

fileButtons[2].onclick=function(){

alert("CSV 가져오기 기능은 다음 코드에서 완성됩니다.");

};

fileButtons[3].onclick=function(){

alert("Excel(xlsx) 가져오기 기능은 다음 코드에서 완성됩니다.");

};

fileInput.onchange=function(){

const file=fileInput.files[0];

if(!file)return;

if(file.name.endsWith(".json")){

uploadJSON(file);

}

};

window.addEventListener(

"resize",

()=>chart.resize()

);

loadEditor();

drawChart();

</script>

</body>

</html>
