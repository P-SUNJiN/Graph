<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2PL팀 STEP-UP 설문조사 결과</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .chart-box { width: 100%; max-width: 600px; margin: 30px auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #3498db; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>노인 스마트폰 사용 실태 및 어려움 설문 결과</h1>

    <div class="chart-box">
        <h2>1. 응답자 연령대 분포 (A1)</h2>
        <canvas id="ageChart"></canvas>
    </div>

    <hr>

    <div class="chart-box">
        <h2>2. 스마트폰 주 사용 용도 (B2)</h2>
        <canvas id="usageChart"></canvas>
    </div>

    <hr>

    <h2>3. 스마트폰 사용 시 주요 어려움 (C영역)</h2>
    <table>
        <thead>
            <tr>
                <th>문항</th>
                <th>매우 그렇다</th>
                <th>그렇다</th>
                <th>보통이다</th>
                <th>그렇지 않다</th>
                <th>전혀 그렇지 않다</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Q1. 시력 관련 (글씨 크기)</td>
                <td>15</td> <td>10</td> <td>5</td> <td>2</td> <td>0</td>
            </tr>
            <tr>
                <td>Q2. 청력 관련 (알림/통화 소리)</td>
                <td>8</td> <td>12</td> <td>7</td> <td>4</td> <td>1</td>
            </tr>
            <tr>
                <td>Q3. 인지 관련 (버튼 혼란)</td>
                <td>12</td> <td>15</td> <td>3</td> <td>2</td> <td>0</td>
            </tr>
            <tr>
                <td>Q4. 조작 관련 (손떨림/터치)</td>
                <td>10</td> <td>11</td> <td>8</td> <td>3</td> <td>0</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // A1. 연령대 데이터 설정 (예시 데이터)
    const ageCtx = document.getElementById('ageChart').getContext('2d');
    new Chart(ageCtx, {
        type: 'pie',
        data: {
            labels: ['60대', '70대', '80대 이상'],
            datasets: [{
                data: [10, 15, 7], // TODO: 실제 설문 결과 숫자로 변경하세요!
                backgroundColor: ['#36a2eb', '#ffce56', '#ff6384']
            }]
        }
    });

    // B2. 주요 용도 데이터 설정 (예시 데이터)
    const usageCtx = document.getElementById('usageChart').getContext('2d');
    new Chart(usageCtx, {
        type: 'bar',
        data: {
            labels: ['전화/문자', '메신저(카톡)', '뉴스/정보', '유튜브/동영상', '은행/공공기관', '기타'],
            datasets: [{
                label: '응답자 수 (복수응답)',
                data: [32, 28, 15, 20, 5, 2], // TODO: 실제 설문 결과 숫자로 변경하세요!
                backgroundColor: '#4bc0c0'
            }]
        },
        options: {
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>
