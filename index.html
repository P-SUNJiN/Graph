<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP-UP 설문 분석 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body data-theme="light">
    <header class="toolbar no-print">
        <div class="logo">📊 STEP-UP Dashboard</div>
        <div class="controls">
            <button onclick="DashboardApp.toggleTheme()"><i class="fas fa-moon"></i> 테마</button>
            <button onclick="DashboardApp.toggleFullScreen()"><i class="fas fa-expand"></i> 전체화면</button>
            <button onclick="DashboardApp.undo()"><i class="fas fa-undo"></i> Undo</button>
            <button onclick="DashboardApp.redo()"><i class="fas fa-redo"></i> Redo</button>
            <select id="exportSelect" onchange="DashboardApp.exportData(this.value)">
                <option value="">💾 내보내기...</option>
                <option value="json">JSON 저장</option>
                <option value="excel">Excel(xlsx) 저장</option>
                <option value="csv">CSV 저장</option>
                <option value="pdf">PDF 저장</option>
                <option value="png">PNG 캡처</option>
            </select>
            <label class="btn-upload">
                <i class="fas fa-upload"></i> 데이터 불러오기
                <input type="file" id="fileInput" accept=".json, .csv, .xlsx" style="display:none;" onchange="DashboardApp.importData(event)">
            </label>
        </div>
    </header>

    <main class="dashboard" id="dashboard-content">
        <section class="summary-cards">
            <div class="card"><h3>총 응답자</h3><h2 id="total-responses">0</h2></div>
            <div class="card"><h3>가장 큰 어려움 (Q1~Q9)</h3><h2 id="top-difficulty">-</h2></div>
            <div class="card"><h3>가장 필요한 도움 (Q10)</h3><h2 id="top-need">-</h2></div>
        </section>

        <section class="chart-grid" id="sortable-charts">
            <div class="chart-card">
                <div class="chart-header">
                    <h3>Q1~Q9. 스마트폰 사용 어려움 종합 비교</h3>
                    <select onchange="DashboardApp.changeChartType('q1_q9_chart', this.value)">
                        <option value="radar">레이더</option><option value="bar">막대</option>
                        <option value="line">선</option><option value="polar">극좌표</option>
                    </select>
                </div>
                <div id="q1_q9_chart" class="chart-container"></div>
            </div>

            <div class="chart-card">
                <div class="chart-header">
                    <h3>Q10. 가장 필요한 도움</h3>
                    <select onchange="DashboardApp.changeChartType('q10_chart', this.value)">
                        <option value="pie">도넛/원</option><option value="rose">로즈</option>
                        <option value="treemap">트리맵</option><option value="funnel">퍼널</option>
                    </select>
                </div>
                <div id="q10_chart" class="chart-container"></div>
            </div>
            
            <div class="chart-card">
                <div class="chart-header">
                    <h3>D. 추가 의견 핵심 키워드</h3>
                </div>
                <canvas id="wordcloud_canvas" class="chart-container"></canvas>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
